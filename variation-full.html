 moat."},{id:"bridge",type:"narrative",background:"dark",headline:"And That’s Just the Core Platform.",subheadline:"There’s a bigger shift happening underneath all of this.",body:["Faster features. Smarter onboarding. Cleaner reporting.","But AI isn’t just making us faster builders.","It’s changing what software itself can do."]},{id:"shift",type:"narrative",background:"gradient",headline:"What If Software Actually Did the Work?",subheadline:"Not organized it. Not dashboarded it. Did it.",body:["Before: PM touches every task. Software is the filing cabinet.","After: AI agents handle 95%. PM handles the 5% that needs judgment.","No chasing rent. No coordinating vendors. No sending reminders.","The AI does it. The PM decides when it can’t."],highlight:"95% autonomous. 5% human judgment."},{id:"demo-command-center",type:"demo",background:"gradient",headline:"The AI Command Center",demoNarrative:"Sarah opens DoorLoop in the morning. Instead of checking 6 dashboards, she sees one feed: everything her 9 AI agents did overnight. 23 tasks handled. 1 needs her decision. 2 to review. The rest — already done.",demoTarget:{page:"command-center"},demoLabel:"See the Command Center →"},{id:"demo-conversations",type:"demo",background:"gradient",headline:"The 6 AM Water Heater",demoNarrative:"A water heater broke at 6 AM. The AI agent texted the tenant, diagnosed the issue, contacted a plumber, got a $2,800 quote, and sent it to the owner for approval. Three parties coordinated. Zero PM involvement until the decision point.",demoTarget:{page:"conversations"},demoLabel:"See the AI in Action →"},{id:"demo-leasing",type:"demo",background:"gradient",headline:"The Vacancy That Fills Itself",demoNarrative:"890 Oak Ave has a vacancy. In 4 days: 47 inquiries, 8 pre-screened to qualified, 3 showings scheduled for Saturday. The agent priced it 3% below market for faster fill. It rejected applicants with past evictions before you even saw them. You just pick the winner.",demoTarget:{page:"leas
